<!DOCTYPE html>
<html>
<head><title>Connecting...</title></head>
<body>
<script>
  // Parse the hash fragment that Google redirects back with
  const params = {};
  window.location.hash.slice(1).split('&').forEach(p => {
    const [k, v] = p.split('=');
    if (k) params[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });

  // Also check query string for error cases
  const query = {};
  window.location.search.slice(1).split('&').forEach(p => {
    const [k, v] = p.split('=');
    if (k) query[decodeURIComponent(k)] = decodeURIComponent(v || '');
  });

  const msg = params.access_token
    ? { type: 'HYPER_OAUTH', access_token: params.access_token, expires_in: params.expires_in, state: params.state }
    : { type: 'HYPER_OAUTH', error: query.error || params.error || 'unknown_error', state: params.state || query.state };

  if (window.opener) {
    window.opener.postMessage(msg, window.location.origin);
  }
  window.close();
</script>
</body>
</html>
